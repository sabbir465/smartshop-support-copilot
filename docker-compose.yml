services:
  backend:
    build:
      context: ./backend
    container_name: smartshop-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/refund_agent.db
      FRONTEND_ORIGIN: http://localhost:8080
    volumes:
      - refund_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: smartshop-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: smartshop-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    container_name: smartshop-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: smartshop-admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  refund_data:
  prometheus_data:
  grafana_data: