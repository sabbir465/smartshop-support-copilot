services:
  backend:
    build:
      context: ./backend
    container_name: smartshop-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/refund_agent.db
      FRONTEND_ORIGIN: http://localhost:8080
    volumes:
      - refund_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: smartshop-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  refund_data: